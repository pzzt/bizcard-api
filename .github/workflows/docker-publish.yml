name: CI/CD Pipeline

# La pipeline parte ogni volta che fai un push sul branch main
on:
  push:
    branches: ["main"]

# I permessi necessari
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # -- Controllo cambiamenti -
      - name: Detect change files
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            app_code:
              - 'app/**'
              - 'Dockerfile'
              - 'requirements.txt'
      # ------------------------------
      # -- Quality Gate -
      - name: Set up Python ${{ matrix.python-version }}
        if: steps.filter.outputs.app_code == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      # Instlla tutte le dipendenze
      - name: Install dependencies
        if: steps.filter.outputs.app_code == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt 
          pip install ruff

      - name: Run Ruff Checkout
        if: steps.filter.outputs.app_code == 'true'
        run: ruff check app/

      - name: Run Test with Pytest
        if: steps.filter.outputs.app_code == 'true'
        run: pytest app/test_main.py -v
      #-- fine quality gate --

  build:
    runs-on: ubuntu-latest
    needs: test #parte solo se il job test è ok
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Fai il login su Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Estrai i metadati (tag, label) per l'immagine
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/bizcard-api
          tags: |
            type=raw,value=latest 
            type=sha,prefix=

      # Costruisci l'immagine Docker e pushala su Docker Hub
      - name: Build and push Docker image
        if: steps.filter.outputs.app_code == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
